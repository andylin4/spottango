<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renewed | Refurbished Computer Store</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav center-nav">
        <div class="logo">STORAGE & TECH</div>
      </div>
</header>

    <main class="container main-layout" id="shop">
      <section class="catalog">
        <div class="toolbar">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="Search products"
          />

          <div class="filter-row">
            <select id="categorySelect">
              <option value="All">All Types</option>
              <option value="Laptop">Laptop</option>
              <option value="Tablet">Tablet</option>
              <option value="Mobile">Mobile</option>
              <option value="Accessory">Accessory</option>
            </select>

            <select id="availabilitySelect">
              <option value="All">All Availability</option>
              <option value="Available">Available</option>
              <option value="Unavailable">Sold Out</option>
            </select>

            <select id="sortSelect">
              <option value="default">Sort By</option>
              <option value="price-low-high">Price: Low to High</option>
              <option value="price-high-low">Price: High to Low</option>
              <option value="name-a-z">Name: A to Z</option>
              <option value="name-z-a">Name: Z to A</option>
            </select>
          </div>
        </div>

        <div id="productsGrid" class="products-grid"></div>
        <div id="emptyState" class="empty-state hidden">
          No products match your filters.
        </div>
      </section>

      <aside class="cart-panel">
        <div class="cart-panel-header">
          <h2>Bag</h2>
          <span id="cartCount">0 items</span>
        </div>

        <div id="cartItems" class="cart-items">
          <div class="empty-cart">Your bag is empty.</div>
        </div>

        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span id="shipping">Calculated at checkout</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="cartTotal">$0.00</span>
          </div>
        </div>

        <a class="checkout-button" href="checkout.html">Go to Checkout</a>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
